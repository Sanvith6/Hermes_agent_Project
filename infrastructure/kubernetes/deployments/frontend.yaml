apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-frontend
  labels:
    app: whatsapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whatsapp-frontend
  template:
    metadata:
      labels:
        app: whatsapp-frontend
    spec:
      containers:
      - name: frontend
        image: whatsapp/frontend:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: whatsapp-frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
